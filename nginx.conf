server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve at both / and /ascii/ so it works behind Caddy's strip_prefix
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(html|css|js)$ {
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
